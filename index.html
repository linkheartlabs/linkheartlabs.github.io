<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkHeart - Emergency AI Assistant</title>
    <script>
      // Robust process shim
      window.process = window.process || { env: { NODE_ENV: 'production' } };
      if (!window.process.env) window.process.env = { NODE_ENV: 'production' };
      
      // Global error reporter to catch "white screen" issues
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#fee;color:#c00;padding:20px;z-index:99999;font-family:sans-serif;border-bottom:4px solid #f00;box-sizing:border-box;overflow:auto;max-height:50vh;';
        div.innerHTML = '<h3 style="margin:0 0 10px">LinkHeart System Error</h3>' + 
                        '<p style="margin:0 0 5px"><b>Details:</b> ' + msg + '</p>' +
                        '<p style="margin:0;font-size:12px">at ' + url + ':' + line + ':' + col + '</p>';
        if (error && error.stack) {
          div.innerHTML += '<pre style="font-size:10px;margin-top:10px;background:#fff;padding:10px;border:1px solid #ecc;white-space:pre-wrap;">' + error.stack + '</pre>';
        }
        document.body.appendChild(div);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;background:#FFFDF9;color:#333;">
        <div style="text-align:center;padding:20px;">
          <div style="width:48px;height:48px;border:5px solid #f3f3f3;border-top:5px solid #FF9F1C;border-radius:50%;animation:lh-spin 1s linear infinite;margin:0 auto 24px;box-shadow:0 4px 10px rgba(0,0,0,0.05);"></div>
          <style>@keyframes lh-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
          <h2 style="margin:0 0 12px;font-weight:700;letter-spacing:-0.02em;">LinkHeart đang khởi tạo...</h2>
          <p style="color:#888;font-size:15px;line-height:1.5;">Vui lòng đợi trong giây lát.<br/><span style="font-size:12px;opacity:0.7;">(Nếu màn hình vẫn giữ nguyên, hãy thử tải lại trang)</span></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
